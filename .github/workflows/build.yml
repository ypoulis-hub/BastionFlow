name: Build

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Build & test (Windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 8 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore BastionFlow.sln

      - name: Build (Release)
        run: dotnet build BastionFlow.sln --configuration Release --no-restore /p:TreatWarningsAsErrors=true

      - name: Test
        run: dotnet test BastionFlow.sln --configuration Release --no-build --logger "trx;LogFileName=test-results.trx"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: '**/TestResults/*.trx'

  installer:
    name: Build installer (on tag)
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 8 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Install Inno Setup
        run: choco install innosetup --no-progress -y

      - name: Regenerate app icon
        run: pwsh -File tools/Generate-Icon.ps1

      - name: Publish (win-x64)
        run: |
          dotnet publish src/BastionFlow.App `
            --configuration Release `
            --runtime win-x64 `
            --self-contained false `
            -p:PublishSingleFile=false `
            --output publish-x64

      - name: Publish (win-arm64)
        run: |
          dotnet publish src/BastionFlow.App `
            --configuration Release `
            --runtime win-arm64 `
            --self-contained false `
            -p:PublishSingleFile=false `
            --output publish-arm64

      - name: Compile installer
        run: |
          $iscc = "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe"
          if (-not (Test-Path $iscc)) { $iscc = "$env:ProgramFiles\Inno Setup 6\ISCC.exe" }
          & $iscc installer\BastionFlow.iss

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: BastionFlow-installer
          path: dist/*.exe

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.exe
          generate_release_notes: true
